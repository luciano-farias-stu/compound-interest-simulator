<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador de Inversión</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<header>
<h1>Simulador de Crecimiento de Inversión</h1>
<p>Compara cómo crece tu dinero en distintos escenarios de inversión.</p>
</header>

<section class="panel">

<h2>Parámetros</h2>

<div class="inputs">

<div class="input-group">
<label>Aporte mensual (CLP)</label>
<input type="text" id="monthly" oninput="formatearInputCLP(this)">
</div>

<div class="input-group">
<label>Años de inversión</label>
<input type="number" id="years">
</div>

<div class="input-group">
<label>Tasa banco (%)</label>
<input type="number" id="bank">
</div>

<div class="input-group">
<label>Tasa mercado (%)</label>
<input type="number" id="market" value="10">
</div>

</div>

<button onclick="simular()">Simular inversión</button>

</section>

<section>

<h2>Resultados</h2>

<div class="resultados">

<div class="card" id="ahorroCard">
Ahorro simple
</div>

<div class="card" id="bancoCard">
Banco
</div>

<div class="card destaque" id="mercadoCard">
Mercado
</div>

</div>

</section>

<section>

<h2>Evolución del capital</h2>

<div class="grafico-box">
<canvas id="grafico"></canvas>
</div>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
